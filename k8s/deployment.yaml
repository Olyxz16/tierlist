apiVersion: apps/v1
kind: Deployment
metadata:
  name: tierlist
  namespace: tierlist
  labels:
    app: tierlist
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tierlist
  template:
    metadata:
      labels:
        app: tierlist
    spec:
      containers:
        - name: tierlist
          image: docker.io/library/tierlist:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: tierlist-config
            - secretRef:
                name: tierlist-secrets
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tierlist-secrets
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      # No volumes needed for SQLite anymore
